<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Youtubarr</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <h1>🎬 Youtubarr</h1>
    <span id="health" class="muted">…</span>
  </header>

  <section class="bar">
    <button onclick="sync()">↻ Sync Radarr</button>
    <button onclick="searchAll()">🔍 Search wanted</button>
    <button onclick="loadFilms()">⟳ Refresh</button>
    <span id="stats" class="muted"></span>
  </section>

  <table id="films">
    <thead><tr>
      <th>Film</th><th>Year</th><th>Runtime</th><th>Status</th>
      <th>YouTube match</th><th>Score</th><th></th>
    </tr></thead>
    <tbody></tbody>
  </table>

  <h2>Download queue</h2>
  <table id="jobs">
    <thead><tr><th>Film</th><th>State</th><th>Progress</th><th>Speed</th><th>ETA</th></tr></thead>
    <tbody></tbody>
  </table>

  <script src="/static/app.js"></script>
</body>
</html>
